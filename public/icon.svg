<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" stroke="#047857" stroke-width="8"/>
  
  <!-- Leaf/plant symbol -->
  <g transform="translate(256,256)">
    <!-- Main stem -->
    <rect x="-8" y="-80" width="16" height="160" fill="#ffffff" rx="8"/>
    
    <!-- Leaves -->
    <ellipse cx="-40" cy="-40" rx="35" ry="20" fill="#ffffff" transform="rotate(-30)"/>
    <ellipse cx="40" cy="-40" rx="35" ry="20" fill="#ffffff" transform="rotate(30)"/>
    <ellipse cx="-45" cy="0" rx="40" ry="25" fill="#ffffff" transform="rotate(-45)"/>
    <ellipse cx="45" cy="0" rx="40" ry="25" fill="#ffffff" transform="rotate(45)"/>
    
    <!-- Small circle in center -->
    <circle cx="0" cy="-10" r="12" fill="#10b981"/>
  </g>
  
  <!-- Border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3"/>
</svg>