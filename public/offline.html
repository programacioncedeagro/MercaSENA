<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercaSENA - Sin Conexión</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            backdrop-filter: blur(10px);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        p {
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.5;
        }
        button {
            background: white;
            color: #059669;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .features {
            margin-top: 2rem;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .feature::before {
            content: "✓";
            margin-right: 0.5rem;
            color: #34d399;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌾</div>
        <h1>Sin Conexión a Internet</h1>
        <p>
            No hay conexión disponible en este momento. 
            MercaSENA funciona mejor con conexión a internet para sincronizar tus datos.
        </p>
        
        <button onclick="retry()" id="retryBtn">
            Intentar de Nuevo
        </button>
        
        <div class="features">
            <div class="feature">Optimizado para conexiones lentas</div>
            <div class="feature">Cache inteligente para mejor rendimiento</div>
            <div class="feature">Funcionalidad básica offline</div>
        </div>
    </div>

    <script>
        function retry() {
            const btn = document.getElementById('retryBtn');
            btn.textContent = 'Conectando...';
            btn.disabled = true;
            
            // Intentar recargar la página
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }
        
        // Auto-retry cuando se restaure la conexión
        window.addEventListener('online', () => {
            retry();
        });
        
        // Mostrar estado de conexión
        if (navigator.onLine) {
            document.querySelector('p').textContent = 
                'Conexión restaurada. Recargando aplicación...';
            setTimeout(() => window.location.reload(), 2000);
        }
    </script>
</body>
</html>
